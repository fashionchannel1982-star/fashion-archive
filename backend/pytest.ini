[pytest]
markers =
    unit: pure offline tests — no DB, no TL, no Anthropic; always run fast
    integration: requires live backend at localhost:8000; auto-skipped when server is down
    eval: relevance eval against golden set; run deliberately with pytest -m eval; never blocks offline gate
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning:pytest_asyncio
